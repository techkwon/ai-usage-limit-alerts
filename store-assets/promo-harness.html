<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 사용량 한도 알림 프로모션 타일</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 440px;
      height: 280px;
      margin: 0;
      overflow: hidden;
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(204, 120, 92, 0.32), transparent 34%),
        radial-gradient(circle at 88% 82%, rgba(66, 133, 244, 0.25), transparent 38%),
        #f5f7fb;
      color: #1e2638;
    }
    .tile {
      position: relative;
      display: flex;
      width: 440px;
      height: 280px;
      flex-direction: column;
      justify-content: center;
      padding: 34px 38px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand img {
      width: 58px;
      height: 58px;
      border-radius: 15px;
      box-shadow: 0 10px 28px rgba(38, 48, 80, 0.18);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
      letter-spacing: -0.04em;
    }
    p {
      margin: 18px 0 0;
      color: #59657d;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.005em;
    }
    .services {
      margin-top: 6px;
      color: #68758d;
      font-size: 12px;
      font-weight: 650;
    }
    .meter {
      display: flex;
      gap: 6px;
      width: 100%;
      height: 7px;
      margin-top: 16px;
    }
    .meter span {
      flex: 1;
      border-radius: 99px;
    }
    .meter span:nth-child(1) { background: #10a37f; }
    .meter span:nth-child(2) { background: #cc785c; }
    .meter span:nth-child(3) { background: #4285f4; }
    .meter span:nth-child(4) { background: #55555e; }
  </style>
</head>
<body>
  <main class="tile">
    <div class="brand">
      <img src="../icons/icon128.png" alt="" />
      <h1 id="promo-title">AI 사용량<br />한도 알림</h1>
    </div>
    <p id="promo-hook">완전 무료 · 광고 없음 · 구독 없음</p>
    <div class="services">ChatGPT · Claude · Gemini · Grok</div>
    <div class="meter" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
  </main>
  <script>
    const locale = new URLSearchParams(location.search).get('lang') === 'ko' ? 'ko' : 'en';
    document.documentElement.lang = locale;
    if (locale !== 'ko') {
      document.title = 'AI Usage Limit Alerts — Promotional Tile';
      document.getElementById('promo-title').innerHTML = 'AI Usage<br />Limit Alerts';
      document.getElementById('promo-hook').textContent = 'Completely free · No ads · No subscription';
    }
  </script>
</body>
</html>
